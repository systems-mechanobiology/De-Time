name: de-time CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  tests:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Check schema asset freshness
        run: python scripts/generate_schema_assets.py --check

      - name: Smoke CLI entrypoints
        run: |
          python -m detime version
          python -m tsdecomp version

      - name: Run test suite
        run: python -m pytest tests -q

  coverage:
    name: Coverage (ubuntu, py3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and coverage dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Check schema asset freshness
        run: python scripts/generate_schema_assets.py --check

      - name: Run tests with coverage
        run: |
          python -m pytest tests \
            --cov=detime \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage-core.xml \
            --cov-report=json:coverage-core.json \
            --cov-report=html:htmlcov-core

      - name: Run package-wide coverage
        run: |
          python -m pytest tests \
            --cov=detime \
            --cov-config=.coveragerc.package \
            --cov-report=term-missing \
            --cov-report=xml:coverage-package.xml \
            --cov-report=json:coverage-package.json \
            --cov-report=html:htmlcov-package

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: de-time-coverage
          path: |
            coverage-core.xml
            coverage-core.json
            htmlcov-core
            coverage-package.xml
            coverage-package.json
            htmlcov-package

  docs:
    name: Docs build (ubuntu, py3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs,notebook]

      - name: Check schema asset freshness
        run: python scripts/generate_schema_assets.py --check

      - name: Check documentation consistency
        run: python scripts/check_doc_consistency.py

      - name: Regenerate schema assets
        run: python scripts/generate_schema_assets.py

      - name: Regenerate performance snapshot
        run: python scripts/generate_performance_snapshot.py

      - name: Regenerate method cards
        run: python scripts/generate_method_cards.py

      - name: Regenerate notebook gallery
        run: python scripts/generate_notebook_gallery.py

      - name: Regenerate tutorial assets
        run: python scripts/generate_tutorial_assets.py

      - name: Regenerate comparison evidence
        run: python benchmarks/software_comparison/generate_comparison_evidence.py

      - name: Regenerate workflow comparison evidence
        run: python examples/workflow_comparisons/compare_specialist_glue_vs_detime.py

      - name: Regenerate token benchmarks
        run: python benchmarks/token_benchmarks/generate_token_benchmarks.py

      - name: Regenerate agent eval summary
        run: python evals/agent/run_agent_evals.py

      - name: Regenerate reviewer bundle
        run: python scripts/generate_reviewer_bundle.py

      - name: Build documentation
        run: mkdocs build --strict

  optional-backend-smoke:
    name: Optional backends (ubuntu, py3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,multivar]

      - name: Check schema asset freshness
        run: python scripts/generate_schema_assets.py --check

      - name: Run optional backend smoke tests
        run: python -m pytest tests/optional/test_multivar_optional_backends.py -q

      - name: Run optional backend example smoke
        run: python examples/optional_multivariate_backends.py
