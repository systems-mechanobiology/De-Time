name: de-time wheels

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "de-time-v*"

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        env:
          CIBW_CONFIG_FILE: ${{ github.workspace }}/cibuildwheel.toml
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Check wheel contents
        run: python scripts/check_dist_contents.py wheelhouse/*.whl

      - name: Smoke install built wheel
        run: |
          python -c "import glob, os, subprocess, sys; from packaging.tags import sys_tags; from packaging.utils import parse_wheel_filename; supported = set(sys_tags()); wheels = []; [wheels.append(path) for path in glob.glob('wheelhouse/*.whl') if parse_wheel_filename(os.path.basename(path))[3] & supported]; assert wheels, 'no supported wheel built for current interpreter'; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', sorted(wheels)[0]])"
          python scripts/release_smoke_matrix.py

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist --outdir dist
          python scripts/check_dist_contents.py dist/*.tar.gz
          python -m twine check dist/*
          python -c "import glob, subprocess, sys; sdists = glob.glob('dist/*.tar.gz'); assert sdists, 'no sdists built'; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', sdists[0]])"
          python scripts/release_smoke_matrix.py

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: de-time-sdist
          path: dist/*.tar.gz

  publish-pypi:
    name: Publish de-time to PyPI
    needs:
      - build-wheels
      - build-sdist
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/de-time-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheelhouse-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: de-time-sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  verify-pypi-install:
    name: Verify PyPI install
    needs:
      - publish-pypi
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/de-time-v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#de-time-v}" >> "$GITHUB_ENV"

      - name: Install from PyPI with retry
        shell: bash
        run: |
          python -m venv .venv-pypi
          source .venv-pypi/bin/activate
          python -m pip install --upgrade pip
          for attempt in {1..10}; do
            if python -m pip install --no-cache-dir "de-time==${RELEASE_VERSION}"; then
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "PyPI install did not become available in time" >&2
              exit 1
            fi
            sleep 15
          done
          python -c "import detime; print(detime.__version__)"
          python -m detime version
          python -m detime schema --name config > /tmp/detime-config-schema.json
          python scripts/release_smoke_matrix.py
